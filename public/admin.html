<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Live Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080c14;--bg2:#0e1520;--bg3:#141d2e;--accent:#00e5ff;--green:#4cff91;--red:#ff6b6b;--yellow:#ffd166;--text:#e8edf5;--muted:#4a5875;--border:rgba(255,255,255,0.07)}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(0,229,255,0.07) 0%,transparent 70%)}
    .login-box{background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:48px 40px;width:360px;text-align:center}
    .login-box h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px}
    .login-box p{font-size:13px;color:var(--muted);margin-bottom:28px}
    .login-box input{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;margin-bottom:14px;letter-spacing:2px}
    .login-box input:focus{border-color:rgba(0,229,255,0.4)}
    .login-box button{width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;padding:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer}
    .login-err{color:var(--red);font-size:13px;margin-top:10px;display:none}
    #dashboard{display:none;flex-direction:column;min-height:100vh}
    header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:200}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px}
    .logo span{color:var(--accent)}
    .hright{display:flex;gap:10px;align-items:center}
    .badge{font-size:11px;font-family:'DM Mono',monospace;padding:5px 12px;border-radius:20px}
    .badge-green{background:rgba(76,255,145,0.08);color:var(--green);border:1px solid rgba(76,255,145,0.2)}
    .badge-count{background:rgba(0,229,255,0.08);color:var(--accent);border:1px solid rgba(0,229,255,0.2)}
    .stats-bar{display:flex;gap:12px;padding:16px 28px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.07);overflow-x:auto}
    .stat{background:var(--bg3);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 20px;white-space:nowrap;flex-shrink:0}
    .stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:4px}
    .stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
    .sv-green{color:var(--green)}.sv-accent{color:var(--accent)}.sv-yellow{color:var(--yellow)}
    .main{display:grid;grid-template-columns:1fr 380px;flex:1;min-height:0}
    .video-section{padding:20px;overflow-y:auto;border-right:1px solid rgba(255,255,255,0.07)}
    .section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
    .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
    .emp-card{background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden}
    .emp-card.offline{opacity:0.5}
    .video-wrap{position:relative;background:#000;aspect-ratio:4/3}
    video{width:100%;height:100%;object-fit:cover;display:block}
    .video-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px}
    .video-placeholder .big{font-size:36px}
    .live-badge{position:absolute;top:8px;left:8px;background:rgba(255,107,107,0.9);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;letter-spacing:1px}
    .live-dot{width:6px;height:6px;background:#fff;border-radius:50%;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .emp-info{padding:10px 12px}
    .emp-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:4px}
    .emp-meta{display:flex;justify-content:space-between;align-items:center}
    .emp-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
    .emp-loc{font-size:11px;color:var(--accent)}
    .emp-status-row{display:flex;gap:5px;margin-top:6px}
    .tag{font-size:10px;padding:2px 7px;border-radius:10px;font-family:'DM Mono',monospace}
    .tag-green{background:rgba(76,255,145,0.1);color:var(--green);border:1px solid rgba(76,255,145,0.2)}
    .tag-blue{background:rgba(0,229,255,0.1);color:var(--accent);border:1px solid rgba(0,229,255,0.2)}
    .stream-btn{width:100%;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);color:var(--accent);font-size:12px;padding:7px;border-radius:8px;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif}
    .stream-btn.active{background:rgba(255,107,107,0.1);border-color:rgba(255,107,107,0.3);color:var(--red)}
    .map-section{display:flex;flex-direction:column}
    .map-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.07);background:var(--bg2)}
    .map-header h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
    #map{flex:1;min-height:400px}
    .map-legend{padding:12px 20px;background:var(--bg2);border-top:1px solid rgba(255,255,255,0.07);display:flex;gap:16px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
    .legend-dot{width:10px;height:10px;border-radius:50%}
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state .big{font-size:48px;margin-bottom:16px}
    .leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(0.8) contrast(1.1)}
    @media(max-width:900px){.main{grid-template-columns:1fr}.map-section{min-height:350px}}
  </style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div style="font-size:40px;margin-bottom:16px">🖥️</div>
    <h2>Admin Monitor</h2>
    <p>Enter password to access live dashboard</p>
    <input type="password" id="pass" placeholder="Password"/>
    <button id="login-btn">Access Dashboard</button>
    <div class="login-err" id="login-err">Wrong password. Try again.</div>
  </div>
</div>

<div id="dashboard">
  <header>
    <div class="logo">Info<span>soft</span> <span style="font-size:13px;color:var(--muted);font-weight:400;font-family:'DM Mono',monospace">Live Monitor</span></div>
    <div class="hright">
      <span class="badge badge-green">● Live</span>
      <span class="badge badge-count" id="hdr-count">0 Online</span>
    </div>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="stat-label">Online</div><div class="stat-val sv-green" id="st-online">0</div></div>
    <div class="stat"><div class="stat-label">Streaming</div><div class="stat-val sv-accent" id="st-streaming">0</div></div>
    <div class="stat"><div class="stat-label">GPS Active</div><div class="stat-val sv-yellow" id="st-gps">0</div></div>
    <div class="stat"><div class="stat-label">Total Today</div><div class="stat-val" id="st-total">0</div></div>
  </div>
  <div class="main">
    <div class="video-section">
      <div class="section-title">📷 Live Feeds</div>
      <div class="video-grid" id="video-grid">
        <div class="empty-state" id="empty-msg">
          <div class="big">👥</div>
          <p>Waiting for employees...</p>
        </div>
      </div>
    </div>
    <div class="map-section">
      <div class="map-header"><h3>📍 Live Location Tracking</h3></div>
      <div id="map"></div>
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4cff91"></div>Online</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>Offline</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00e5ff"></div>Moving</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ── ALL CODE INSIDE ONE SCRIPT BLOCK ─────────────────────────────────────

var socket       = io();
var SESSION_PASS = '';
var employees    = {};
var peerConns    = {};
var streaming    = {};
var markers      = {};
var streamCount  = 0;

// ── MAP ───────────────────────────────────────────────────────────────────
var map = L.map('map').setView([20.5937, 78.9629], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;background:'+color+';border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px '+color+'"></div>',
    iconSize: [14,14], iconAnchor: [7,7]
  });
}

// ── LOGIN BUTTON ──────────────────────────────────────────────────────────
document.getElementById('login-btn').onclick = function() {
  var pw = document.getElementById('pass').value.trim();
  if (!pw) return;
  SESSION_PASS = pw;
  socket.emit('admin:join', { password: pw });
};

document.getElementById('pass').onkeydown = function(e) {
  if (e.key === 'Enter') document.getElementById('login-btn').onclick();
};

// ── AUTO LOGIN ────────────────────────────────────────────────────────────
socket.on('connect', function() {
  var savedPass = localStorage.getItem('admin_pass');
  var savedDate = localStorage.getItem('admin_date');
  var today     = new Date().toDateString();
  if (savedPass && savedDate === today) {
    SESSION_PASS = savedPass;
    socket.emit('admin:join', { password: savedPass });
  }
});

// ── AUTH EVENTS ───────────────────────────────────────────────────────────
socket.on('admin:auth-fail', function() {
  localStorage.removeItem('admin_pass');
  localStorage.removeItem('admin_date');
  document.getElementById('login-err').style.display = 'block';
});

socket.on('admin:employee-list', function(list) {
  // Save password for whole day
  localStorage.setItem('admin_pass', SESSION_PASS);
  localStorage.setItem('admin_date', new Date().toDateString());
  // Show dashboard
  document.getElementById('login').style.display     = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  for (var i = 0; i < list.length; i++) addEmployee(list[i]);
  updateStats();
});

// ── EMPLOYEE EVENTS ───────────────────────────────────────────────────────
socket.on('employee:new', function(emp) {
  addEmployee(emp);
  updateStats();
});

socket.on('employee:offline', function(data) {
  var id = data.id;
  if (employees[id]) {
    employees[id].online = false;
    var card = document.getElementById('card-'+id);
    if (card) card.classList.add('offline');
    if (markers[id]) markers[id].setIcon(makeIcon('#ff6b6b'));
    updateStats();
  }
});

socket.on('employee:location', function(data) {
  var id  = data.id;
  var loc = data.location;
  if (employees[id]) employees[id].location = loc;
  var locEl = document.getElementById('loc-'+id);
  if (locEl) locEl.textContent = '📍 ' + loc.lat.toFixed(4) + ', ' + loc.lon.toFixed(4);
  var latlng = [loc.lat, loc.lon];
  if (markers[id]) {
    markers[id].setLatLng(latlng);
    markers[id].setIcon(makeIcon('#00e5ff'));
    setTimeout(function() { if(markers[id]) markers[id].setIcon(makeIcon('#4cff91')); }, 1000);
  } else {
    markers[id] = L.marker(latlng, { icon: makeIcon('#4cff91') })
      .addTo(map)
      .bindPopup('<b>'+(employees[id] ? employees[id].name : 'Employee')+'</b>');
    map.setView(latlng, 15);
  }
  updateStats();
});

// ── WEBRTC EVENTS ─────────────────────────────────────────────────────────
socket.on('webrtc:offer', function(data) {
  var pc = peerConns[data.from];
  if (!pc) return;
  pc.setRemoteDescription(new RTCSessionDescription(data.offer)).then(function() {
    return pc.createAnswer();
  }).then(function(answer) {
    return pc.setLocalDescription(answer).then(function() {
      socket.emit('webrtc:answer', { to: data.from, answer: answer });
    });
  });
});

socket.on('webrtc:ice', function(data) {
  var pc = peerConns[data.from];
  if (pc) {
    try { pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e) {}
  }
});

// ── ADD EMPLOYEE CARD ─────────────────────────────────────────────────────
function addEmployee(emp) {
  employees[emp.id] = emp;
  var emptyMsg = document.getElementById('empty-msg');
  if (emptyMsg) emptyMsg.remove();

  var card = document.createElement('div');
  card.className = 'emp-card';
  card.id = 'card-' + emp.id;
  card.innerHTML =
    '<div class="video-wrap" id="vwrap-'+emp.id+'">' +
      '<div class="video-placeholder" id="vph-'+emp.id+'">' +
        '<div class="big">👤</div>' +
        '<div>'+emp.name+'</div>' +
      '</div>' +
    '</div>' +
    '<div class="emp-info">' +
      '<div class="emp-name">'+emp.name+'</div>' +
      '<div class="emp-meta">' +
        '<span class="emp-id">'+emp.empId+'</span>' +
        '<span class="emp-loc" id="loc-'+emp.id+'">📍 Waiting...</span>' +
      '</div>' +
      '<div class="emp-status-row">' +
        '<span class="tag tag-green">● Online</span>' +
        '<span class="tag tag-blue">📷 Cam</span>' +
        '<span class="tag tag-blue">🎙 Mic</span>' +
      '</div>' +
      '<button class="stream-btn" id="sbtn-'+emp.id+'" onclick="toggleStream(\''+emp.id+'\')">▶ Start Stream</button>' +
'<button class="stream-btn" id="cbtn-'+emp.id+'" onclick="switchCamera(\''+emp.id+'\')" style="margin-top:6px;display:none;">🔄 Switch Camera</button>' +
    '</div>';
  document.getElementById('video-grid').appendChild(card);
}

// ── TOGGLE STREAM ─────────────────────────────────────────────────────────
function toggleStream(empId) {
  var btn = document.getElementById('sbtn-'+empId);

  if (streaming[empId]) {
    if (peerConns[empId]) { peerConns[empId].close(); delete peerConns[empId]; }
    delete streaming[empId];
    streamCount = Math.max(0, streamCount - 1);
    btn.textContent = '▶ Start Stream';
    btn.classList.remove('active');
    var vwrap = document.getElementById('vwrap-'+empId);
    vwrap.innerHTML = '<div class="video-placeholder" id="vph-'+empId+'"><div class="big">👤</div><div>'+(employees[empId]?employees[empId].name:'')+'</div></div>';
    updateStats();
    return;
  }

  btn.textContent = '⏳ Connecting...';
  btn.disabled = true;

  var pc = new RTCPeerConnection({
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]
  });
  peerConns[empId] = pc;

  pc.ontrack = function(event) {
    var vwrap = document.getElementById('vwrap-'+empId);
    var vid = document.getElementById('vid-'+empId);
    if (!vid) {
      var ph = document.getElementById('vph-'+empId);
      if (ph) ph.remove();
      vid = document.createElement('video');
      vid.id = 'vid-'+empId;
      vid.autoplay = true;
      vid.playsInline = true;
      vid.muted = false;
      vwrap.appendChild(vid);
      var badge = document.createElement('div');
      badge.className = 'live-badge';
      badge.innerHTML = '<div class="live-dot"></div>LIVE';
      vwrap.appendChild(badge);
    }
    vid.srcObject = event.streams[0];
    streaming[empId] = true;
    streamCount++;
    btn.textContent = '⏹ Stop Stream';
    document.getElementById('cbtn-'+empId).style.display = 'block';
    btn.classList.add('active');
    btn.disabled = false;
    updateStats();
  };

  pc.onicecandidate = function(e) {
    if (e.candidate) socket.emit('webrtc:ice', { to: empId, candidate: e.candidate });
  };

  pc.onconnectionstatechange = function() {
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected' || pc.connectionState === 'closed') {
      delete streaming[empId];
      streamCount = Math.max(0, streamCount - 1);
      btn.textContent = '▶ Start Stream';
      document.getElementById('cbtn-'+empId).style.display = 'none';
      btn.classList.remove('active');
      btn.disabled = false;
      updateStats();
    }
  };

  pc.addTransceiver('video', { direction: 'recvonly' });
  pc.addTransceiver('audio', { direction: 'recvonly' });

  socket.emit('admin:request-stream', { employeeId: empId });

  socket.once('webrtc:offer', function(data) {
    if (data.from !== empId) return;
    pc.setRemoteDescription(new RTCSessionDescription(data.offer)).then(function() {
      return pc.createAnswer();
    }).then(function(answer) {
      return pc.setLocalDescription(answer).then(function() {
        socket.emit('webrtc:answer', { to: empId, answer: answer });
      });
    });
  });

  setTimeout(function() {
    if (!streaming[empId]) {
      btn.textContent = '▶ Start Stream';
      btn.disabled = false;
    }
  }, 12000);
}

// ── STATS ─────────────────────────────────────────────────────────────────

function switchCamera(empId) {
    socket.emit('admin:switch-camera', { employeeId: empId });
  }

function updateStats() {
  var keys   = Object.keys(employees);
  var online = 0;
  var withGps = 0;
  for (var i = 0; i < keys.length; i++) {
    if (employees[keys[i]].online !== false) online++;
    if (employees[keys[i]].location) withGps++;
  }
  document.getElementById('st-online').textContent    = online;
  document.getElementById('st-streaming').textContent = streamCount;
  document.getElementById('st-gps').textContent       = withGps;
  document.getElementById('st-total').textContent     = keys.length;
  document.getElementById('hdr-count').textContent    = online + ' Online';
}

setInterval(updateStats, 5000);

</script>
</body>
</html>
